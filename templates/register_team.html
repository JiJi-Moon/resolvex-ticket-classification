{% extends "base.html" %}
{% block content %}

<section class="relative text-center py-16">
    <div class="absolute inset-0 -z-10">
        <div class="absolute top-[-100px] left-1/2 -translate-x-1/2 w-[500px] h-[500px] 
                    bg-blue-500/20 rounded-full blur-3xl"></div>
    </div>

    <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 
               bg-clip-text text-transparent">
        Register New Team
    </h1>

    <p class="text-slate-600 mt-4 text-sm max-w-2xl mx-auto">
        Create a department team with auto-generated credentials.
    </p>
</section>

<div class="max-w-xl mx-auto bg-white p-10 rounded-3xl shadow-lg border">

    <form method="POST" class="space-y-6">

        <!-- Department Dropdown -->
        <div>
            <label for="department" class="block text-sm font-medium text-slate-700 mb-2">
                Select Department
            </label>

            <select id="department"
                    name="department"
                    required
                    class="w-full px-4 py-3 rounded-2xl border border-slate-300 text-sm
                           focus:outline-none focus:ring-2 focus:ring-indigo-500">

                <option value="">Choose Department</option>

                {% for dept in departments %}
                    <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}

            </select>
        </div>

        <button type="submit"
                class="w-full py-4 rounded-2xl bg-gradient-to-r 
                       from-blue-600 to-indigo-600 text-white font-semibold shadow-md">
            Create Team
        </button>

    </form>

</div>

{% endblock %}
