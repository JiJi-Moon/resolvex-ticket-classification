<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ResolveX</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold text-slate-800">
            Resolve<span class="text-indigo-600">X</span>
        </h1>
        <p class="text-sm text-slate-500 mt-2">
            Create your account
        </p>
    </div>

    <!-- Card -->
    <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-50 border border-red-200 text-red-600 p-3 rounded-lg mb-5 text-sm text-center">
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-5">

            <!-- Full Name -->
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-2">
                    Full Name
                </label>
                <input type="text"
                       id="name"
                       name="name"
                       class="w-full p-3 border border-slate-300 rounded-lg 
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 
                              focus:border-indigo-500 text-sm"
                       required>
            </div>

            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-2">
                    Username
                </label>
                <input type="text"
                       id="username"
                       name="username"
                       class="w-full p-3 border border-slate-300 rounded-lg 
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 
                              focus:border-indigo-500 text-sm"
                       required>
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-2">
                    Email
                </label>
                <input type="email"
                       id="email"
                       name="email"
                       class="w-full p-3 border border-slate-300 rounded-lg 
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 
                              focus:border-indigo-500 text-sm"
                       required>
            </div>

            <!-- Password -->
            <div class="relative">
                <label for="reg_password" class="block text-sm font-medium text-slate-700 mb-2">
                    Password
                </label>

                <input type="password"
                       id="reg_password"
                       name="password"
                       class="w-full p-3 border border-slate-300 rounded-lg 
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 
                              focus:border-indigo-500 text-sm"
                       required>

                <button type="button"
                        onclick="togglePassword('reg_password', this)"
                        class="absolute right-3 top-10 text-xs text-slate-500 hover:text-indigo-600">
                    Show
                </button>
            </div>

            <!-- Register Button -->
            <button class="w-full bg-blue-600 hover:bg-blue-700 
                           text-white p-3 rounded-lg 
                           transition-all duration-200 text-sm font-medium">
                Register
            </button>

        </form>

        <p class="mt-6 text-center text-sm text-slate-600">
            Already have an account?
            <a href="/login" class="text-indigo-600 font-medium hover:underline">
                Login
            </a>
        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
